name: Run Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run test scripts
        run: |
          scripts=$(find . -name "test*.sh")
          if [ -z "$scripts" ]; then
            echo "No test scripts found."
            exit 1
          fi

          # The -e flag ensures the workflow fails if any script fails.
          # We use a pipe to a while loop to handle filenames with spaces correctly.
          find . -name "test*.sh" -print0 | while IFS= read -r -d $'\0' script; do
            echo "Running $script"
            bash "$script" || exit 1
          done
